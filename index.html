  <style>
    body { background: #f9fafb; }
    
    .job-card {
      background: white;

      margin-bottom: 1.75rem;
      position: relative;
      transition: box-shadow 0.2s;

      border-radius: 9999px;
      background: #e5e7eb;
      color: #414a55;
      margin: 0.75rem 0 1rem 0;
    }
    .delete-icon {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      color: #9ca3af;
      cursor: pointer;
      font-size: 1.25rem;
    } 
      .badge-interview { background: #045c3e; color: white; }
    .badge-rejected  { background: #cd3838; color: white; }
    .metadata {
      font-size: 0.98rem;
      color: #4b5563;

    }
    .tab-active { background-color: #3370d1 !important; color: white !important; }
